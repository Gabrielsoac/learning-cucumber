cucumber.plugin=pretty, html:target/cucumber-reports/relatorio.html, json:target/cucumber-reports/cucumber.json

# 2. Filtrar por Tags (Ex: Roda testes com @smoke, mas ignora @ignorar)
cucumber.filter.tags=@smoke and not @ignorar

# 3. Formato dos Snippets (When o passo não existe, gerar camelCase ou under_score)
cucumber.snippet-type=camelcase

# 4. Desligar a propaganda de publicar relatório na nuvem do Cucumber
cucumber.publish.quiet=true